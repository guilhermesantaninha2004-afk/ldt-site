<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Catálogo - LDT Equipamentos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="logo-area">
            <img src="img/logo.png.png" class="logo">
            <div class="logo-text">
                <h2>LDT Equipamentos</h2>
                <span>EPIs e Ferramentas</span>
            </div>
        </div>
    </header>

    <section id="catalogo" class="catalogo">
        <h2>Catálogo 2026</h2>

        <!-- ✅ AGORA É GALERIA -->
        <div class="galeria">
            <img src="img/produto1.jpg.png">
            <img src="img/produto2.jpg.png">
            <img src="img/produto3.jpg.png">
            <img src="img/produto4.jpg.png">
        </div>

    </section>

    <!-- ✅ MODAL (OBRIGATÓRIO) -->
    <div id="modal" class="modal">
        <span class="fechar">&times;</span>
        <img class="modal-img" id="imgExpandida">
        <div class="setas">
            <span class="prev">&#10094;</span>
            <span class="next">&#10095;</span>
        </div>
    </div>

    <!-- ✅ SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
